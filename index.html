<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PizzadogXP Soundboard</title>
<style>
body{margin:0;background:linear-gradient(135deg,#0d0221,#140033,#001133);color:#fff;font-family:Trebuchet MS,sans-serif;text-align:center;padding:20px}
h1{text-shadow:0 0 20px #7df9ff;color:#7df9ff}
#search{width:90%;max-width:500px;padding:12px;border-radius:12px;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;max-width:1100px;margin:auto}
button{padding:15px;border-radius:12px;border:2px solid #7df9ff;background:#1b103f;color:#fff;font-size:18px;cursor:pointer;animation:glow 2s infinite alternate}
button:hover{transform:scale(1.08)}
@keyframes glow{from{box-shadow:0 0 6px #7df9ff}to{box-shadow:0 0 22px #7df9ff,0 0 40px #8a2be2}}
canvas{width:100%;max-width:700px;height:70px;background:#111;border-radius:10px;margin:10px auto;display:block}
</style></head><body>
<h1>🎵 PizzadogXP Soundboard</h1>
<input id='search' placeholder='Search...' oninput='searchSongs()'><br><br>
<div id='now'>Currently Playing: Nothing</div>
<button onclick='stopAll()'>Stop All</button><br><br>
<input id='volume' type='range' min='0' max='1' step='0.01' value='1'>
<input id='progress' type='range' min='0' max='100' value='0'>
<canvas id='wave' width='700' height='70'></canvas>
<div class='grid' id='grid'></div>
<script>
const songs=["Megalovania","CrabRave","Astronomia","Sans","Bonetrousle","SpearOfJustice","StereoMadness","Deadlocked","Electrodynamix","Asgore","RushE","DeathByGlamour","MetalCrush","HopesAndDreams","SpiderDance","Shop","Finale"];
const grid=document.getElementById('grid');
songs.forEach(s=>{grid.innerHTML+=`<button onclick="play('${s}')">${s.replace(/([A-Z])/g,' $1').trim()}</button><audio id="${s}" src="${s}.mp3"></audio>`});
let cur=null;
function play(id){stopAll();cur=document.getElementById(id);cur.volume=volume.value;cur.play();now.textContent='Currently Playing: '+id.replace(/([A-Z])/g,' $1').trim();}
function stopAll(){document.querySelectorAll('audio').forEach(a=>{a.pause();a.currentTime=0});now.textContent='Currently Playing: Nothing'}
volume.oninput=()=>{if(cur)cur.volume=volume.value}
progress.oninput=()=>{if(cur&&cur.duration)cur.currentTime=progress.value/100*cur.duration}
setInterval(()=>{if(cur&&cur.duration){progress.value=cur.currentTime/cur.duration*100;let c=wave.getContext('2d');c.clearRect(0,0,700,70);for(let i=0;i<70;i++){let h=10+Math.random()*50;c.fillStyle='#7df9ff';c.fillRect(i*10,70-h,6,h);}}},50);
function searchSongs(){let q=search.value.toLowerCase();document.querySelectorAll('.grid button').forEach(b=>b.style.display=b.textContent.toLowerCase().includes(q)?'':'none')}
</script></body></html>
