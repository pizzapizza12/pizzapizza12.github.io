<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PizzadogXP Soundboard</title>

<style>
body{
margin:0;
padding:20px;
text-align:center;
font-family:Trebuchet MS,sans-serif;
background:linear-gradient(135deg,#0d0221,#140033,#001133);
color:#fff;
}

h1{
color:#7df9ff;
text-shadow:0 0 20px #7df9ff;
}

#search{
width:90%;
max-width:500px;
padding:12px;
border:none;
border-radius:12px;
font-size:18px;
margin-bottom:10px;
}

#nowPlaying{
margin:15px;
color:#7df9ff;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
max-width:1100px;
margin:auto;
}

button{
background:#1b103f;
color:#fff;
border:2px solid #7df9ff;
border-radius:12px;
padding:15px;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 20px #7df9ff;
}

.controls{
margin:20px;
}

input[type=range]{
width:220px;
}
</style>
</head>

<body>

<h1>🎵 PizzadogXP Soundboard 🎵</h1>

<input id="search" placeholder="🔍 Search songs..." onkeyup="searchSongs()">

<div id="nowPlaying">Currently Playing: Nothing</div>

<div class="controls">
<button onclick="stopAll()">⏹ Stop All</button><br><br>

🔊 Volume<br>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1"><br><br>

🎵 Progress<br>
<input type="range" id="progress" min="0" max="100" value="0">
</div>

<div class="grid">

<button onclick="playSound('Megalovania')">Megalovania</button>
<button onclick="playSound('CrabRave')">Crab Rave</button>
<button onclick="playSound('Astronomia')">Astronomia</button>
<button onclick="playSound('Sans')">Sans</button>
<button onclick="playSound('Bonetrousle')">Bonetrousle</button>
<button onclick="playSound('SpearOfJustice')">Spear Of Justice</button>
<button onclick="playSound('StereoMadness')">Stereo Madness</button>
<button onclick="playSound('Deadlocked')">Deadlocked</button>
<button onclick="playSound('Electrodynamix')">Electrodynamix</button>
<button onclick="playSound('Asgore')">Asgore</button>
<button onclick="playSound('RushE')">Rush E</button>
<button onclick="playSound('DeathByGlamour')">Death By Glamour</button>
<button onclick="playSound('MetalCrush')">Metal Crush</button>
<button onclick="playSound('HopesAndDreams')">Hopes And Dreams</button>
<button onclick="playSound('SpiderDance')">Spider Dance</button>

</div>

<audio id="Megalovania" src="Megalovania.mp3"></audio>
<audio id="CrabRave" src="CrabRave.mp3"></audio>
<audio id="Astronomia" src="Astronomia.mp3"></audio>
<audio id="Sans" src="Sans.mp3"></audio>
<audio id="Bonetrousle" src="Bonetrousle.mp3"></audio>
<audio id="SpearOfJustice" src="SpearOfJustice.mp3"></audio>
<audio id="StereoMadness" src="StereoMadness.mp3"></audio>
<audio id="Deadlocked" src="Deadlocked.mp3"></audio>
<audio id="Electrodynamix" src="Electrodynamix.mp3"></audio>
<audio id="Asgore" src="Asgore.mp3"></audio>
<audio id="RushE" src="RushE.mp3"></audio>
<audio id="DeathByGlamour" src="DeathByGlamour.mp3"></audio>
<audio id="MetalCrush" src="MetalCrush.mp3"></audio>
<audio id="HopesAndDreams" src="HopesAndDreams.mp3"></audio>
<audio id="SpiderDance" src="SpiderDance.mp3"></audio>

<script>
let currentAudio = null;

function playSound(id){
stopAll();
currentAudio = document.getElementById(id);
currentAudio.volume = document.getElementById("volume").value;
currentAudio.currentTime = 0;
currentAudio.play();

document.getElementById("nowPlaying").innerText =
"Currently Playing: " + id.replace(/([A-Z])/g," $1").trim();

currentAudio.ontimeupdate = function(){
if(currentAudio.duration){
document.getElementById("progress").value =
(currentAudio.currentTime / currentAudio.duration) * 100;
}
};
}

function stopAll(){
document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime = 0;
});
document.getElementById("nowPlaying").innerText = "Currently Playing: Nothing";
}

document.getElementById("volume").addEventListener("input",function(){
if(currentAudio){
currentAudio.volume = this.value;
}
});

document.getElementById("progress").addEventListener("input",function(){
if(currentAudio && currentAudio.duration){
currentAudio.currentTime =
(this.value/100) * currentAudio.duration;
}
});

function searchSongs(){
let q = document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".grid button").forEach(b=>{
b.style.display = b.innerText.toLowerCase().includes(q) ? "" : "none";
});
}
</script>

</body>
</html>
