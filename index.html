<!DOCTYPE html>

<html>
<head>
    <title>My Soundboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin: 0;
            padding: 20px;
        }

```
    h1 {
        margin-bottom: 30px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        max-width: 1000px;
        margin: auto;
    }

    button {
        padding: 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    button:hover {
        transform: scale(1.05);
    }
</style>
```

</head>
<body>

```
<h1>🎵 My Soundboard 🎵</h1>

<div class="grid">
    <button onclick="document.getElementById('Megalovania').play()">Megalovania</button>
    <button onclick="document.getElementById('CrabRave').play()">Crab Rave</button>
    <button onclick="document.getElementById('Astronomia').play()">Astronomia</button>
    <button onclick="document.getElementById('Sans').play()">Sans</button>
    <button onclick="document.getElementById('Bonetrousle').play()">Bonetrousle</button>
    <button onclick="document.getElementById('SpearOfJustice').play()">Spear Of Justice</button>
</div>

<audio id="Megalovania" src="Megalovania.mp3"></audio>
<audio id="CrabRave" src="CrabRave.mp3"></audio>
<audio id="Astronomia" src="Astronomia.mp3"></audio>
<audio id="Sans" src="Sans.mp3"></audio>
<audio id="Bonetrousle" src="Bonetrousle.mp3"></audio>
<audio id="SpearOfJustice" src="SpearOfJustice.mp3"></audio>
```

</body>
</html>
